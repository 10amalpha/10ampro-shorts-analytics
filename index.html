// Load ALL clips from Google Sheets
async function loadFromGSheet() {
  const resp = await fetch("/api/fetch-gsheet");
  if (!resp.ok) throw new Error("GSheet API error: " + resp.status);
  const json = await resp.json();
  if (!json.data || !json.data.length) throw new Error("No clips from GSheet");
  
  return json.data.map(clip => {
    const igId = clip.ig ? (clip.ig.match(/\/reel\/([A-Za-z0-9_-]+)/) || [])[1] : null;
    const ytId = clip.yt ? (clip.yt.match(/shorts\/([a-zA-Z0-9_-]+)/) || [])[1] : null;
    const cache = CACHED_TTX[igId] || CACHED_TTX[ytId] || null;
    
    return {
      id: clip.id,
      title: clip.title || "",
      date: clip.date,
      tiktok: clip.tiktok || "",
      yt: clip.yt || "",
      ig: clip.ig || "",
      x: clip.x || "",
      views: { tiktok: cache?.tv || 0, yt: 0, ig: 0, x: cache?.xv || 0 },
      likes: { tiktok: cache?.tl || 0, yt: 0, ig: 0, x: cache?.xl || 0 },
      comments: { tiktok: cache?.tc || 0, yt: 0, ig: 0, x: cache?.xc || 0 },
      shares: { tiktok: cache?.ts || 0, yt: 0, ig: 0, x: cache?.xs || 0 },
    };
  });
}

async function autoFetchYT() {
  const ytMap = {};
  SAMPLE_DATA.forEach((d, idx) => {
    if (!d.yt) return;
    const m = d.yt.match(/shorts\/([a-zA-Z0-9_-]+)/);
    if (!m) return;
    if (!ytMap[m[1]]) ytMap[m[1]] = [];
    ytMap[m[1]].push(idx);
  });
  const ids = Object.keys(ytMap);
  if (!ids.length) return;
  const chunks = [];
  for (let i = 0; i < ids.length; i += 50) chunks.push(ids.slice(i, i + 50).join(","));
  for (const chunk of chunks) {
    const resp = await fetch(`/api/fetch-yt?ids=${chunk}`);
    if (!resp.ok) continue;
    const json = await resp.json();
    if (json.data) {
      Object.entries(json.data).forEach(([vidId, stats]) => {
        (ytMap[vidId] || []).forEach(idx => {
          if (stats.views > 0) {
            SAMPLE_DATA[idx].views.yt = stats.views;
            SAMPLE_DATA[idx].likes.yt = stats.likes;
            SAMPLE_DATA[idx].comments.yt = stats.comments;
          }
        });
      });
    }
  }
  console.log("[10AMPRO] YouTube data updated via API");
}

async function autoFetchIG() {
  const resp = await fetch("/api/fetch-ig");
  if (!resp.ok) return;
  const json = await resp.json();
  if (!json.data) return;
  const igMap = {};
  json.data.forEach(item => {
    if (!item.permalink) return;
    const m = item.permalink.match(/\/reel\/([A-Za-z0-9_-]+)/);
    if (m) igMap[m[1]] = item;
  });
  let matched = 0;
  SAMPLE_DATA.forEach(clip => {
    if (!clip.ig) return;
    const m = clip.ig.match(/\/reel\/([A-Za-z0-9_-]+)/);
    if (!m) return;
    const d = igMap[m[1]];
    if (d) {
      if (d.likes > 0) clip.likes.ig = d.likes;
      if (d.comments > 0) clip.comments.ig = d.comments;
      if (d.views > 0) clip.views.ig = d.views;
      if (d.shares > 0) clip.shares.ig = d.shares;
      if (!clip.title && d.caption) clip.title = d.caption.substring(0, 80);
      matched++;
    }
  });
  console.log(`[10AMPRO] Instagram data updated via API (${matched} matched)`);
}

// Pipeline: GSheet → TT/X cache (built-in) → YT API → IG API → Render
(async function loadAllData() {
  try {
    const clips = await loadFromGSheet();
    SAMPLE_DATA.length = 0;
    clips.forEach(c => SAMPLE_DATA.push(c));
    console.log(`[10AMPRO] Loaded ${SAMPLE_DATA.length} clips from Google Sheets`);
  } catch(e) { console.warn("[10AMPRO] GSheet failed:", e.message); }
  try { await autoFetchYT(); } catch(e) { console.warn("[10AMPRO] YT:", e.message); }
  try { await autoFetchIG(); } catch(e) { console.warn("[10AMPRO] IG:", e.message); }
  // Dispatch immediately + with delay to guarantee React catches it
  window.dispatchEvent(new Event("yt-data-updated"));
  setTimeout(() => window.dispatchEvent(new Event("yt-data-updated")), 500);
  setTimeout(() => window.dispatchEvent(new Event("yt-data-updated")), 2000);
  console.log(`[10AMPRO] All data loaded: ${SAMPLE_DATA.length} clips`);
})();

  if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
  if (n >= 1000) return (n / 1000).toFixed(1) + "K";

};

// All time periods derived from data
function computePeriods() {
  if (!SAMPLE_DATA.length) return [{ label: "All Time", start: "2025-01-01", end: "2026-12-31" }];
  const dates = SAMPLE_DATA.map(d => d.date).sort();
  const first = dates[0], last = dates[dates.length - 1];
  const periods = [{ label: "All Time", start: first, end: last }];
  const months = {};
  SAMPLE_DATA.forEach(d => {
    const ym = d.date.slice(0,7);
    if (!months[ym]) months[ym] = { start: d.date, end: d.date };
    if (d.date < months[ym].start) months[ym].start = d.date;
    if (d.date > months[ym].end) months[ym].end = d.date;
  });
  Object.entries(months).sort().forEach(([ym, {start, end}]) => {
    const [y, m] = ym.split('-').map(Number);
    const monthName = new Date(y, m-1, 1).toLocaleString('en', {month:'long', year:'numeric'});
    periods.push({ label: monthName, start, end });
  });
  return periods;
}

          // Theme classification
          const classify = (title) => {
            const t = title.toLowerCase();
            if (['colombia','venezuel','qatar','mínimo','salario','economía colombiana','migran','empresario','batalla cultural','reversa','seguridad'].some(k=>t.includes(k))) return 'Colombia / Venezuela Economía';
            if (['ia','ai','grok','robot','duolingo','claude','cowork','productividad','trabajo'].some(k=>t.includes(k))) return 'IA & Futuro del Trabajo';

          };

          const themes = {};

          const themeStats = Object.entries(themes).map(([name, vids]) => {

          // X outperformers (X beats TikTok)

          // YT outperformers
          const ytWins = ACTIVE_DATA.filter(v => v.views.yt > v.views.tiktok && v.views.yt > 400)
            .sort((a,b) => (b.views.yt - b.views.tiktok) - (a.views.yt - a.views.tiktok)).slice(0,3);

          // Top 3 all-time
          const top3 = [...ACTIVE_DATA].sort((a,b) => (PLATFORMS.reduce((s,p)=>s+b.views[p],0))-(PLATFORMS.reduce((s,p)=>s+a.views[p],0))).slice(0,3);

          // Engagement leaders (TikTok, min 500 views)
          const engLeaders = ACTIVE_DATA.filter(v=>v.views.tiktok>500).map(v=>({...v, engRate: (v.likes.tiktok+v.comments.tiktok)/v.views.tiktok*100})).sort((a,b)=>b.engRate-a.engRate).slice(0,3);

          const colVenTheme = themeStats.find(t=>t.name==='Colombia / Venezuela Economía');
          const aiTheme     = themeStats.find(t=>t.name==='IA & Futuro del Trabajo');
          const topColAvgTT = colVenTheme?.avgTT || 0;
          const aiAvgTT     = aiTheme?.avgTT || 0;
          const multiplier  = topColAvgTT > 0 && aiAvgTT > 0 ? (topColAvgTT/aiAvgTT).toFixed(1) : '?';

          // ── NEW INSIGHTS ──
          // Day-of-week analysis
          const dowMap = {'Mon':0,'Tue':0,'Wed':0,'Thu':0,'Fri':0,'Sat':0,'Sun':0};
          const dowCount = {...dowMap};
          const dowNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
          ACTIVE_DATA.forEach(v => {
            const d = new Date(v.date + 'T12:00:00');
            const dow = dowNames[d.getDay()];
            dowMap[dow] = (dowMap[dow]||0) + PLATFORMS.reduce((s,p)=>s+v.views[p],0);
            dowCount[dow] = (dowCount[dow]||0) + 1;
          });
          const dowAvg = Object.entries(dowMap).map(([d,t])=>({day:d, avg: dowCount[d]>0?Math.round(t/dowCount[d]):0, count:dowCount[d]})).sort((a,b)=>b.avg-a.avg);
          const bestDay = dowAvg[0];
          const worstDay = dowAvg[dowAvg.length-1];

          // Title length
          const shortTitles = ACTIVE_DATA.filter(v=>v.title.length < 35);
          const longTitles  = ACTIVE_DATA.filter(v=>v.title.length >= 35);
          const shortAvgTT  = Math.round(shortTitles.reduce((a,v)=>a+v.views.tiktok,0)/Math.max(shortTitles.length,1));
          const longAvgTT   = Math.round(longTitles.reduce((a,v)=>a+v.views.tiktok,0)/Math.max(longTitles.length,1));

              </div>

                          <span style={{ color:"#4b5563" }}> vs </span>

              </div>

        {/* ══════════ CONVERSIÓN ══════════ */}
        {view === "conversion" && (() => {
          // Intent score = views × (comments/1K) — clips that drive action
          const withIntent = ACTIVE_DATA.map(v => {
            const cpm = (() => {const tv=PLATFORMS.reduce((s,p)=>s+v.views[p],0);const tc=PLATFORMS.reduce((s,p)=>s+v.comments[p],0);return tv>0?tc/tv*1000:0})();
            const lpm = (() => {const tv=PLATFORMS.reduce((s,p)=>s+v.views[p],0);const tl=PLATFORMS.reduce((s,p)=>s+v.likes[p],0);return tv>0?tl/tv*1000:0})();
            const clRatio = (() => {const tl=PLATFORMS.reduce((s,p)=>s+v.likes[p],0);const tc=PLATFORMS.reduce((s,p)=>s+v.comments[p],0);return tl>0?tc/tl:0})();
            const intentScore = (() => {const tv=PLATFORMS.reduce((s,p)=>s+v.views[p],0);return Math.round(tv*cpm)})();
            return { ...v, cpm: +cpm.toFixed(1), lpm: +lpm.toFixed(1), clRatio: +clRatio.toFixed(3), intentScore };
          });

          const byIntent = [...withIntent].sort((a, b) => b.intentScore - a.intentScore);
          const byCpm = [...withIntent].filter(v => PLATFORMS.reduce((s,p)=>s+v.views[p],0) >= 300).sort((a, b) => b.cpm - a.cpm);

          const totalComments = withIntent.reduce((s, v) => s + PLATFORMS.reduce((ps,p)=>ps+v.comments[p],0), 0);
          const totalViews = withIntent.reduce((s, v) => s + PLATFORMS.reduce((ps,p)=>ps+v.views[p],0), 0);
          const avgCpm = totalViews > 0 ? +(totalComments / totalViews * 1000).toFixed(2) : 0;
          const clipsWithComments = withIntent.filter(v => v.comments.tiktok > 0).length;

          // Theme intent analysis
          const classify = (title) => {
            const t = title.toLowerCase();
            if (['colombia','venezuel','salario','economía colombiana','migran','empresario','batalla cultural','reversa'].some(k=>t.includes(k))) return 'Colombia/Venezuela';
            if (['ia','ai','grok','robot','duolingo','claude','productividad'].some(k=>t.includes(k))) return 'IA/Tech';
            if (['bitcoin','solana','etf','crypto','staking','blockchain'].some(k=>t.includes(k))) return 'Crypto';
            if (['inversión','invertir','portafolio','riesgo','primeros principios','mercado','wall street'].some(k=>t.includes(k))) return 'Inversión';
            return 'Otro';
          };
          const themeIntent = {};
          withIntent.forEach(v => {
            const cat = classify(v.title);
            if (!themeIntent[cat]) themeIntent[cat] = { clips: 0, cpmSum: 0, clSum: 0, comments: 0, views: 0 };
            themeIntent[cat].clips++;
            themeIntent[cat].cpmSum += v.cpm;
            themeIntent[cat].clSum += v.clRatio;
            themeIntent[cat].comments += PLATFORMS.reduce((s,p)=>s+v.comments[p],0);
            themeIntent[cat].views += PLATFORMS.reduce((s,p)=>s+v.views[p],0);
          });
          const themeRows = Object.entries(themeIntent).map(([name, d]) => ({
            name,
            clips: d.clips,
            avgCpm: +(d.cpmSum / d.clips).toFixed(2),
            avgCl: +(d.clSum / d.clips * 100).toFixed(1),
            totalComments: d.comments,
          })).sort((a, b) => b.avgCpm - a.avgCpm);

          // Intent buckets
          const buckets = { '0': 0, '0-1': 0, '1-3': 0, '3+': 0 };
          withIntent.filter(v => PLATFORMS.reduce((s,p)=>s+v.views[p],0) >= 100).forEach(v => {
            if (v.cpm === 0) buckets['0']++;
            else if (v.cpm < 1) buckets['0-1']++;
            else if (v.cpm < 3) buckets['1-3']++;

                  <h3 style={{ fontSize: 13, color: "#8a8f98", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4 }}>🎯 Intent por Categoría</h3>

                            position:"absolute", left:`${x}%`, top:`${y}%`,
                            transform:"translate(-50%,-50%)",
                            display:"flex", alignItems:"center", justifyContent:"center",
                            flexDirection:"column", zIndex: 2,
                          }}>
                            <div style={{
                              width:r, height:r, borderRadius:"50%",
                              background:`${col}25`, border:`2px solid ${col}`,
                              boxShadow: `0 0 12px ${col}30`,
                            }} />
                            <div style={{
                              marginTop: 4,
                              background: "#0d0f14ee",
                              borderRadius: 4,
                              padding: "2px 6px",
                              textAlign: "center",
                              whiteSpace: "nowrap",
                            }}>
                              <div style={{ fontSize:10, fontWeight:700, color:col, fontFamily:"'JetBrains Mono',monospace", lineHeight:1.3 }}>{c.name}</div>
                              <div style={{ fontSize:9, color:`${col}bb`, fontFamily:"'JetBrains Mono',monospace" }}>n={c.n}</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })()}
              </div>
            </>
          );
        })()}

        {/* Footer */}
        <div style={{
          textAlign: "center",
          padding: "24px 0 12px",
          fontSize: 11,
          color: "#4b5563",
          fontFamily: "'JetBrains Mono', monospace",
        }}>
          10AMPRO Shorts Intelligence · Feb 25, 2026 · IG ✅ TT ✅ YT ✅ X ✅ · {analytics.count} clips
        </div>
      </div>
    </div>
  );
}

const App = ShortsAnalytics;
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
